<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Workspace Dashboard</title>
    <script src="https://elfsightcdn.com/platform.js" async></script>
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --bg-medium: #242424;
            --bg-light: #2d2d2d;
            --bg-input: #333333;
            --text-main: #f0f0f0;
            --text-muted: #aaaaaa;
            --accent-blue: #007acc;
            --accent-green: #28a745;
            --border-color: #3a3a3a;
            --sidebar-width: 60px;
        }

        /* Customizable Themes */
        [data-theme="midnight"] {
            --bg-dark: #0b0e14;
            --bg-medium: #151b26;
            --bg-light: #1f293a;
            --bg-input: #2c3b54;
            --text-main: #e6edf3;
            --accent-blue: #58a6ff;
        }

        [data-theme="matrix"] {
            --bg-dark: #000000;
            --bg-medium: #0d110d;
            --bg-light: #1a221a;
            --bg-input: #111811;
            --text-main: #00ff00;
            --text-muted: #00aa00;
            --accent-blue: #33ff33;
            --border-color: #00ff00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--bg-dark);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-dark);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            justify-content: space-between;
        }

        .sidebar-top {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            width: 100%;
        }

        .sidebar-link {
            color: var(--text-muted);
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.02);
            font-size: 1.1rem;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .sidebar-link:hover, .sidebar-link.active {
            background: var(--bg-light);
            color: var(--text-main);
            border-color: var(--border-color);
        }

        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-medium);
        }

        .tab-content {
            display: none;
            width: 100%;
            height: 100%;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        /* TABS INTERFACE */
        .tabs-navbar {
            background-color: var(--bg-dark);
            display: flex;
            align-items: center;
            padding: 5px 10px 0 10px;
            gap: 5px;
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
        }

        .browser-tab {
            background-color: var(--bg-medium);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 6px 6px 0 0;
            border: 1px solid var(--border-color);
            border-bottom: none;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            max-width: 150px;
        }

        .browser-tab.active {
            background-color: var(--bg-light);
            color: var(--text-main);
            font-weight: 500;
            border-color: var(--border-color);
        }

        .close-tab-btn {
            color: var(--text-muted);
            font-weight: bold;
            cursor: pointer;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .close-tab-btn:hover {
            background-color: #ff4a4a;
            color: #ffffff;
        }

        .add-tab-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 10px;
            margin-bottom: 4px;
        }

        .browser-view {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            flex: 1;
        }

        .tab-frame-container {
            flex: 1;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .browser-frame {
            display: none;
            width: 100%;
            height: 100%;
            border: none;
            background-color: #fff;
        }

        .browser-frame.active {
            display: block;
        }

        .browser-bar {
            background-color: var(--bg-dark);
            padding: 10px 15px;
            display: flex;
            gap: 12px;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .search-container {
            flex: 1;
            position: relative;
        }

        .url-input {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .url-input:focus {
            border-color: var(--accent-blue);
        }

        .search-suggestions {
            display: none;
            position: absolute;
            top: 42px;
            left: 0;
            width: 100%;
            background-color: var(--bg-light);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-height: 200px;
            overflow-y: auto;
        }

        .suggestion-item {
            padding: 10px 14px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-main);
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .suggestion-item:hover {
            background-color: var(--accent-blue);
            color: #ffffff;
        }

        /* BOOKMARKS BAR */
        .bookmarks-bar {
            background-color: var(--bg-medium);
            padding: 6px 15px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border-color);
            align-items: center;
        }

        .bookmark-chip {
            background: var(--bg-light);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .bookmark-chip:hover {
            border-color: var(--accent-blue);
        }

        /* BUTTONS STYLING */
        .custom-btn {
            background-color: var(--bg-light);
            color: var(--text-main
